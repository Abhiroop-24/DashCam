<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashCam Monitor</title>
    <meta name="description" content="Smart DashCam — AI collision monitoring system">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
</head>
<body>
    <!-- Header -->
    <header id="header">
        <div class="header-left">
            <div class="logo-group">
                <svg class="logo-icon" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="white" stroke-width="1.5"/><circle cx="10" cy="10" r="3" fill="white"/><line x1="10" y1="2" x2="10" y2="5" stroke="white" stroke-width="1.5"/><line x1="10" y1="15" x2="10" y2="18" stroke="white" stroke-width="1.5"/><line x1="2" y1="10" x2="5" y2="10" stroke="white" stroke-width="1.5"/><line x1="15" y1="10" x2="18" y2="10" stroke="white" stroke-width="1.5"/></svg>
                <span class="logo">DASHCAM</span>
            </div>
            <div class="header-divider"></div>
            <div class="status-group">
                <div class="status-item"><span class="status-dot" id="dot-stream"></span><span class="status-label" id="label-stream">Stream</span></div>
                <div class="status-item"><span class="status-dot" id="dot-pi"></span><span class="status-label" id="label-pi">Pi</span></div>
                <div class="status-item"><span class="status-dot" id="dot-ai"></span><span class="status-label" id="label-ai">AI</span></div>
            </div>
        </div>
        <div class="header-right">
            <div class="header-stat"><span class="stat-value" id="fps-display">0</span><span class="stat-unit">FPS</span></div>
            <div class="header-stat"><span class="stat-value" id="inference-display">0</span><span class="stat-unit">ms</span></div>
            <div class="header-divider"></div>
            <span class="clock" id="clock"></span>
        </div>
    </header>

    <main>
        <!-- Top Section: Feed + Sidebar -->
        <div class="grid">
            <!-- Live Feed -->
            <section class="card card-feed" id="card-feed">
                <div class="card-header">
                    <div class="card-title">
                        <span class="title-dot live"></span>
                        Live Feed
                    </div>
                    <div class="card-actions">
                        <button class="btn" id="btn-snapshot" onclick="sendCommand('snapshot')">
                            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="3" width="12" height="9" rx="1.5" stroke="currentColor" stroke-width="1.2"/><circle cx="7" cy="7.5" r="2.5" stroke="currentColor" stroke-width="1.2"/><rect x="5" y="1" width="4" height="2" rx="0.5" fill="currentColor" opacity="0.5"/></svg>
                            Snapshot
                        </button>
                        <button class="btn btn-accent" id="btn-record" onclick="sendCommand('record_event')">
                            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.2"/><circle cx="7" cy="7" r="2" fill="currentColor"/></svg>
                            Save Clip
                        </button>
                    </div>
                </div>
                <div class="feed-wrap">
                    <img src="/video_feed" alt="Live feed" id="live-feed">
                    <div class="feed-overlay-top">
                        <div class="feed-badge" id="rec-badge" style="display:none;">● REC</div>
                    </div>
                    <div class="feed-overlay-bottom">
                        <span class="feed-tag" id="buffer-display">BUFFER 0s</span>
                    </div>
                </div>
            </section>

            <!-- Sidebar -->
            <aside class="sidebar">
                <!-- Sensor Cards -->
                <div class="sensor-pair">
                    <div class="card card-sensor">
                        <div class="sensor-icon">
                            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2v14M2 9h14M4.5 4.5l9 9M13.5 4.5l-9 9" stroke="currentColor" stroke-width="1.2" opacity="0.4"/><circle cx="9" cy="9" r="3" stroke="currentColor" stroke-width="1.5"/></svg>
                        </div>
                        <div class="sensor-data">
                            <div class="sensor-label">G-FORCE</div>
                            <div class="sensor-value" id="gforce-val">0.00<small>g</small></div>
                        </div>
                        <div class="sensor-bar-track"><div class="sensor-bar" id="gforce-bar"></div></div>
                        <div class="sensor-axes">
                            <span>X <b id="ax">0.00</b></span>
                            <span>Y <b id="ay">0.00</b></span>
                            <span>Z <b id="az">0.00</b></span>
                        </div>
                    </div>
                    <div class="card card-sensor">
                        <div class="sensor-icon">
                            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 3v3M9 12v3M5 6l4 3 4-3M5 12l4-3 4 3" stroke="currentColor" stroke-width="1.2"/></svg>
                        </div>
                        <div class="sensor-data">
                            <div class="sensor-label">PROXIMITY</div>
                            <div class="sensor-value" id="dist-val">--<small>cm</small></div>
                        </div>
                        <div class="sensor-bar-track"><div class="sensor-bar" id="dist-bar"></div></div>
                    </div>
                </div>

                <!-- Temperature -->
                <div class="card card-sensor card-temp" id="card-temp">
                    <div class="sensor-icon temp-icon">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                            <rect x="7" y="2" width="4" height="10" rx="2" stroke="currentColor" stroke-width="1.2"/>
                            <circle cx="9" cy="14" r="2.5" stroke="currentColor" stroke-width="1.2"/>
                            <line x1="9" y1="7" x2="9" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div class="sensor-data">
                        <div class="sensor-label">MPU6050 TEMP</div>
                        <div class="sensor-value" id="temp-val">--<small>°C</small></div>
                    </div>
                    <div class="sensor-bar-track"><div class="sensor-bar" id="temp-bar"></div></div>
                    <div class="sensor-axes">
                        <span id="temp-f">--°F</span>
                    </div>
                </div>

                <!-- Detections -->
                <div class="card">
                    <div class="card-header compact">
                        <span class="card-title small">Detections</span>
                        <span class="badge" id="det-count">0</span>
                    </div>
                    <div class="scroll-list" id="det-list">
                        <div class="empty-state">No objects detected</div>
                    </div>
                </div>

                <!-- Events -->
                <div class="card">
                    <div class="card-header compact">
                        <span class="card-title small">Events</span>
                        <span class="badge" id="evt-count">0</span>
                    </div>
                    <div class="scroll-list" id="evt-list">
                        <div class="empty-state">No events yet</div>
                    </div>
                </div>

                <!-- Settings -->
                <div class="card">
                    <div class="card-header compact">
                        <span class="card-title small">Settings</span>
                    </div>
                    <div class="settings-body">
                        <div class="setting-row">
                            <label>Alert distance</label>
                            <div class="setting-control">
                                <input type="range" id="dist-threshold" min="5" max="200" value="25" step="5">
                                <span class="setting-val" id="dist-threshold-val">25cm</span>
                            </div>
                        </div>
                    </div>
                </div>
            </aside>
        </div>

        <!-- Recordings Bar -->
        <section class="card card-recordings">
            <div class="card-header compact">
                <span class="card-title small">Recordings</span>
                <button class="btn btn-sm" onclick="clearAll()">Clear All</button>
            </div>
            <div class="rec-strip" id="rec-strip">
                <div class="empty-state">Recordings appear here after events.</div>
            </div>
        </section>
    </main>

    <!-- Media Modal -->
    <div class="modal-overlay" id="media-modal" style="display:none;" onclick="closeModal(event)">
        <div class="modal-box" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div class="modal-media" id="modal-content"></div>
            <div class="modal-caption" id="modal-info"></div>
        </div>
    </div>

    <!-- Collision Alert -->
    <div class="collision-overlay" id="collision-flash" style="display:none;">
        <div class="collision-badge">
            <span class="collision-icon">!</span>
            <span>COLLISION DETECTED</span>
        </div>
    </div>

    <!-- Toasts -->
    <div class="toasts" id="toasts"></div>

    <script src="/static/js/dashboard.js"></script>
</body>
</html>
